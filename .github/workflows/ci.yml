name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, types, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/carnet_ci
      NEXT_PUBLIC_WEB_URL: http://127.0.0.1:3001
      WEB_URL: http://127.0.0.1:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --cwd packages/database run build

      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Run repository checks
        run: bun run check

  e2e:
    name: Production end-to-end smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: carnet_e2e
          POSTGRES_PASSWORD: e2e-password
          POSTGRES_USER: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d carnet_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://e2e:e2e-password@127.0.0.1:5432/carnet_ci
      E2E_DATABASE_URL: postgresql://e2e:e2e-password@127.0.0.1:5432/carnet_e2e
      E2E_SUPERADMIN_EMAIL: e2e-admin@carnet.local
      E2E_SUPERADMIN_PASSWORD: ci-only-e2e-password
      NEXT_PUBLIC_WEB_URL: http://127.0.0.1:3001
      WEB_URL: http://127.0.0.1:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --cwd packages/database run build

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run production E2E test
        run: bun run test:e2e

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results
          if-no-files-found: ignore
